<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give Hope Charity</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    header {
      background: #2563eb;
      color: white;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .search-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      padding: 2rem;
    }
    .search-card h2 {
      margin-top: 0;
      color: #0f172a;
    }
    .search-form {
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .search-form input,
    .search-form button {
      width: 100%;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
    }
    .search-form button {
      background: #2563eb;
      border-color: transparent;
      color: white;
      cursor: pointer;
    }
    .search-form button:hover {
      background: #1d4ed8;
    }
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <header>
    <h1>Give Hope Charity</h1>
    <p>Search for credible charity organizations making a positive impact.</p>
  </header>
  <main>
    <section class="search-card">
      <h2>Find charities by cause</h2>
      <p>Enter a keyword or cause to discover verified nonprofit organizations.</p>
      <form class="search-form">
        <input type="text" placeholder="Search charities, causes, or locations" aria-label="Search charities" />
        <button type="submit">Search</button>
      </form>
    </section>
  </main>
  <footer>
    <p>Built to connect people with credible charities and support good causes.</p>
  </footer>
</body>
</html>
